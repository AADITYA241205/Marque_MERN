<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *{
            margin: 0px;
            padding: 0px;
        }
        .grid{
            display: grid;
            grid-template-columns: 1fr 5.25fr;
            grid-template-rows: 1fr 14fr;
            height: 100vh;
            margin: 0px;
        }
        .div1{
            background-color: aqua;
        }
        #d1{
            background-color: #343a40;
            border-bottom: 1px solid gray;
            color: rgb(185, 183, 183);
            padding-left: 100px;
            padding-top: 17px;
            font-size: larger;
            font-family: Arial, Helvetica, 'Segoe UI', Tahoma, Geneva, Verdana, Verdana, Geneva, Tahoma, sans-serif;
        }
        #d3{
            background-color: #343a40;
        }
        #d2{
            background-color: #212529;
            border-bottom: 1px solid gray;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #d4{
            background-color: #2b3035;
        }
        .cir{
            position: absolute;
            left: 50px;
            top: 5px;
            height: 45px;
            width: 45px;
            border-radius: 50%;
            background-image: url(image.png);
            background-size: contain;
        }
        .nav{
            /* background-color: antiquewhite; */
            height: 70%;
            width: 95%;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .ul{
            background-color: rgb(179, 102, 0);
            background-image: url(imagecp.png);
            background-size: cover;
            height: 100%;
            width: 40%;
            list-style: none;
        }
        .ul2{
            /* background-color: rgb(75, 0, 179); */
            display: flex;
            height: 100%;
            width: 30%;
            list-style: none;
            align-items: center;
            justify-content: space-evenly;
        }
        .cir1{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(dash.png);
            background-size: cover;
            background-color: rgb(185,183, 183);
            display: inline-block;
            margin-right: 5%;
        }
        .cirpro{
            width: 20px;
            height: 20px;
            /* margin-top: 20%; */
            border-radius: 50%;
            background-color: rgb(185,183, 183);
            display: inline-block;
            margin-right: 5%;
        }
        .cir2{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(dash1.png);
            background-size: cover;
            background-color: rgb(185,183, 183);
            display: inline-block;
            margin-right: 5%;
        }
        .cirt{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(theme.png);
            background-size: cover;
            background-color: rgb(185,183, 183);
            display: inline-block;
            margin-right: 5%;
        }
        .cirw{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(wid.png);
            background-size: cover;
            background-color: rgb(185,183, 183);
            display: inline-block;
            margin-right: 5%;
        }
        .cirl{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(lay.png);
            background-size: cover;
            background-color: rgb(185,183, 183);
            display: inline-block;
            margin-right: 5%;
        }
        .cirui{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(ui.png);
            background-size: cover;
            background-color: rgb(185,183, 183);
            display: inline-block;
            margin-right: 5%;
        }
        .cirm{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(mail.png);
            background-size: contain;
            background-position-y: center;
            background-repeat: no-repeat;
            /* background-color: rgb(185,183, 183); */
            display: inline-block;
            margin-right: 5%;
        }
        .cirf{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(forms.png);
            background-size: cover ;
            /* background-color: rgb(185,183, 183); */
            display: inline-block;
            margin-right: 5%;
        }
        .cirtab{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(tab.png);
            background-size: cover ;
            /* background-color: rgb(185,183, 183); */
            display: inline-block;
            margin-right: 5%;
        }
        .cirp{
            width: 20px;
            height: 20px;
            border-radius: 50%;
            background-image: url(pages.png);
            background-size: contain;
            background-position-x: center;
            /* background-color: rgb(185,183, 183); */
            display: inline-block;
            margin-right: 5%;
        }
        .ab{
            display: flex;
            align-items: center;
            margin-left: 10%;
            margin-top: 10%;
            font-size:16px;
            font-family: source Arial, Helvetica, sans-serif;
            /* font-weight: 500;   */
            color: rgb(255, 255, 255);
        }
        .dash{
            /* background-color: aqua; */
            color: rgb(249, 255, 255);
            height: 5%;
            font-size: 30px;
            font-family:source Arial, Helvetica, sans-serif ;
            margin-left: 3%;
            margin-top: 2%;
        }
        .box{
            display: flex;
            /* background-color: aqua; */
            width: 100%;
            height: 30%;
            align-items: center;
            justify-content: space-evenly;
        }
        .c1{
            /* background-color: violet; */
            height: 70%;
            width: 23%;
            border-radius: 15%;
        }
        #id1{
            /* background-color: blue; */
            background-image: url(ord.png);
            background-size: contain;
            background-repeat: no-repeat;
            background-position-x: center;
            background-position-y: center ;
        }
        #id2{
            /* background-color: green; */
            background-image: url(bounce.png);
            background-size: contain;
            background-repeat: no-repeat;
            background-position-x: center;
            background-position-y: center ;
        }   
        #id3{
            /* background-color: yellow; */
            background-image: url(user.png);
            background-size: contain;
            background-repeat: no-repeat;
            background-position-x: center;
            background-position-y: center ;
        }
        #id4{
            /* background-color: tomato; */
            background-image: url(unique.png);
            background-size: contain;
            background-repeat: no-repeat;
            background-position-x: center;
            background-position-y: center ;
        }
        .graph{
            height: 60%;
            width: 50%;
            /* background-color: rgb(0, 0, 0); */
            background-image: url(sales.png);
            background-size: contain;
            background-repeat: no-repeat;
            margin-left: 4%;
            display: inline-block;
        }
        .map{
            height: 60%;
            width: 35%;
            /* background-color: rgb(0, 0, 0); */
            background-image: url(map.png) ;
            background-size: contain;
            background-repeat: no-repeat;
            margin-left: 4%;
            display: inline-block;
        }
        .name{
            /* /* background-color: aquamarine;  */
            margin-left: 10%;
            color: aliceblue;
        }
    </style>
</head>
<body>
    <div class="grid">
        <div class="div1" id="d1">
            <div class="cir"></div>
            <div class="text1">AdminLTE 4</div>
        </div>
        <div class="div1" id="d2">
            <div class="nav">
                <ul class="ul">
                    <li class="dot3"></li>
                </ul>
                <div class="ul2">
                    <li>🔍</li>
                    <li>💬</li>
                    <li>🔔</li>
                    <li>🌙</li>
                    <li style="display: flex; justify-content: center; align-items: center; width: 30%;"><div class="cirpro"></div> <div class="name">Aadi</div></li>
                </div>
            </div>
        </div>
        <div class="div1" id="d3">
            <ul class="ul3">
                <li class="ab"><div class="cir1"></div>Dashboard</li>
                <li class="ab"><div class="cir2"></div>Dashboard v1</li>
                <li class="ab"><div class="cir2"></div>Dashboard v2</li>
                <li class="ab"><div class="cir2"></div>Dashboard v3</li>
                <li class="ab"><div class="cirt"></div>Theme Generate</li>
                <li class="ab"><div class="cirw"></div>Widgets</li>
                <li class="ab"><div class="cirl"></div>Layout Options</li>
                <li class="ab"><div class="cirui"></div>UI Elements</li>
                <li class="ab"><div class="cirm"></div>Mailbox</li>
                <li class="ab"><div class="cirf"></div>Forms</li>
                <li class="ab"><div class="cirtab"></div>Tables   </li>
                <li class="ab">Pages</li>
                <li class="ab"><div class="cirp"></div>Pages</li>
            </ul>
        </div>
        <div class="div1" id="d4">
            <div class="dash">Dashboard</div>
            <div class="box">
                <div class="c1" id="id1"></div>
                <div class="c1" id="id2"></div>
                <div class="c1" id="id3"></div>
                <div class="c1" id="id4"></div>
            </div>
            <div class="graph"></div>
            <div class="map"></div>
        </div>
    </div>
</body>
</html>
