            padding: 20px;

            border-radius: 20px;

        }

        }
        #sq6{

            grid-column: 3 / 4;
            display: flex;
            align-items: end;

        }
        #sq5{
            background-color:rgb(82, 8, 231);
            font-size: 60px;

        }

        }

            border-radius: 10px;
            border: 1px solid black;
            margin: 10px;
            background-repeat: no-repeat;
            padding-top: 2px;
        }
    </style>
    </head>
<body>
