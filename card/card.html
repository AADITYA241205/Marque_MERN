<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .container{
            display: flex;
            height: 500px;
            width: 450px;
            border-radius: 20px;
            flex-wrap: wrap;
            overflow: hidden;
        }
        .cont{
            background-color: blue;
            /* border: 2px solid red; */
            width: 500px;
            height: 150px;
        }
        .bro{
            background-color:white;
            /* border: 2px solid red; */
            width: 500px;
            height: 560px;
        }
        .cir{
            background-color: cyan;
            border: 5px solid blue;
            width: 150px;
            height: 150px;
            border-radius: 50%;
            position: absolute;
            left: 145px;
            top: 40px;
            background-image: url(https://static.vecteezy.com/system/resources/thumbnails/032/176/197/small/business-avatar-profile-black-icon-man-of-user-symbol-in-trendy-flat-style-isolated-on-male-profile-people-diverse-face-for-social-network-or-web-vector.jpg);
            background-size: cover;
        }
        .text{
            font-size: 30px;
            font-weight: bold;
            margin-top: 40px;
            margin-left: 135px;
        }
        .about{
            font-size: 20px;
            /* font-weight: bold; */
            margin-top: 8px;
            margin-left: 130px;
        }
        .box{
            /* background-color: cyan; */
            /* border: 2px solid blue; */
            height: 50px;
            width: 400px;
            margin-top: 20px;
            margin-left: 70px;
        }
        .cle{
            background-color: blue;
            /* border: 2px solid cyan; */
            height: 50px;
            width: 50px;
            border-radius: 50%;
            display: inline-block;
            margin-left: 15px;
        }
        .mes{
            /* background-color: cyan; */
            /* border: 2px solid blue; */
            height: 40px;
            width: 410px;
            margin-top: 30px;
            margin-left: 50px;
        }
        .age{
            background-color: blue;
            height: 30px;
            width: 150px;
            border-radius: 20px;
            text-align: center;
            color: white;
            padding-top: 9px;
            font-size: 20px;
            margin-right: 30px;
            display: inline-block;
        }
        .nig{
            /* background-color:aquamarine; */
            height: 100px;
            width: 400px;
            margin-top: 40px;
            margin-left: 30px;
        }
        .heart{
            font-size: 20px;
            text-align: center;
            display: inline-block;
        }
        .like{
            /* background-color: blue; */
            height: 60px;
            width: 100px;
            margin-left: 20px;
            border-radius: 20px;
            display: inline-block;
        }
        .comment{
            /* background-color: blue; */
            height: 60px;
            width: 100px;
            margin-left: 20px;
            border-radius: 20px;
            display: inline-block;
        }
    </style>
</head>
<body style="background-color: black;">
    <div class="container">
        <div class="cont">
            <div class="cir"></div>
        </div>

        <div class="bro">
            <div class="text">Coding Lab</div>
            <div class="about">Youtuber & Blogger</div>
            <div class="box">
                <div class="cle" style="background-image: url(https://store-images.s-microsoft.com/image/apps.37935.9007199266245907.b029bd80-381a-4869-854f-bac6f359c5c9.91f8693c-c75b-4050-a796-63e1314d18c9?h=210); background-size: cover;" ></div>
                <div class="cle" style="background-color: cyan; background-image: url(https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSjbxj3iLM4tP144QHpLMbEO4UbfFZCOdSvXw&s); background-size: cover;" ></div>
                <div class="cle" style="background-color: deeppink; background-image: url(https://play-lh.googleusercontent.com/bh871pyeIpMnJxGYKmTJCm-5VwIYrPUYhHQcCky0B-DpsMoPCWVSDKz0Ic7MLsGuLmS4F_-iE6BilqsUM2DloA); background-size: cover;"></div>
                <div class="cle" style="background-color: crimson; background-image: url(https://storage.googleapis.com/gweb-uniblog-publish-prod/images/YouTube.width-500.format-webp.webp); background-size: cover;"></div>
            </div>
            <div class="mes">
                <div class="age">Subscribe</div>
                <div class="age">Message</div>
            </div>
            <div class="nig">
                <div class="like">
                    <div class="heart">🩷 60.4K </div>
                </div>
                <div class="comment">
                    <div class="heart">💬 20K </div>
                </div>
                <div class="comment">
                    <div class="heart">🔗 12.4K </div>
                </div>
                
                    
            </div>
        </div>

</html>
